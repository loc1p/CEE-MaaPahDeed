services:
  - type: web
    name: maapahdeed
    runtime: node
    plan: free
    buildCommand: npm --prefix backend install
    startCommand: npm --prefix backend start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
